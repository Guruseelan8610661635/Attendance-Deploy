# ======================
# Server Configuration
# ======================
server.port=${PORT:8080}

# ======================
# CORS Configuration
# ======================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# ======================
# Database Configuration
# ======================
# For local development, defaults are provided so you can run without setting env vars.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/attendance_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:29aug2005}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================
# JPA / Hibernate
# ======================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ======================
# JWT Configuration
# ======================
# IMPORTANT: In production, set JWT_SECRET to a secure random value.
jwt.secret=${JWT_SECRET:4Ah8Mq2Kp6Nw1Xb3Zt5Lj9Ry7Vf0Dg8Ks4Cm2Np6Bc3Fx5Wq7Jd9Ts1Vr8Lh0Ek2Mp4Ng}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ======================
# Logging
# ======================
logging.level.root=INFO
logging.level.com.attendance=DEBUG
